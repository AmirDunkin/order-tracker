<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1f36">
    <title>Offline — OrderTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .offline-card {
            max-width: 420px;
            text-align: center;
            padding: 2.5rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(26, 31, 54, 0.12);
        }
        .offline-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            background: #1a1f36;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2rem;
        }
        h1 { color: #1a1f36; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">&#128246;</div>
        <h1 class="mb-3">You're Offline</h1>
        <p class="text-muted mb-4">
            You're offline, showing cached data. Some features may be unavailable until your connection is restored.
        </p>
        <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
